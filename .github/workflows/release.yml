name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome
        run: npm run build

      - name: Build Firefox
        run: npm run build:firefox

      - name: Package Chrome
        run: npm run zip

      - name: Package Firefox
        run: npm run zip:firefox

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## 更新内容

            请查看 [Commits](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) 了解详细变更。

            ## 下载

            - **Chrome**: `nav-plugin-${{ steps.version.outputs.VERSION }}-chrome.zip`
            - **Firefox**: `nav-plugin-${{ steps.version.outputs.VERSION }}-firefox.zip`

            ## 安装说明

            ### Chrome
            1. 下载 Chrome 版本 zip 文件并解压
            2. 打开 `chrome://extensions/`
            3. 开启"开发者模式"
            4. 点击"加载已解压的扩展程序"

            ### Firefox
            1. 下载 Firefox 版本 zip 文件
            2. 打开 `about:addons`
            3. 点击齿轮图标 → "从文件安装附加组件"
            4. 选择下载的 zip 文件
          files: |
            .output/nav-plugin-${{ steps.version.outputs.VERSION }}-chrome.zip
            .output/nav-plugin-${{ steps.version.outputs.VERSION }}-firefox.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
